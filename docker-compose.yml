services:

  # ── MLflow UI ──────────────────────────────────────────
  mlflow:
    build:
      context: .
      dockerfile: Dockerfile.pipeline
    ports:
      - "5001:5001"
    volumes:
      - ./mlruns:/app/mlruns
      - ./mlflow.db:/app/mlflow.db
    command: >
      mlflow server
        --host 0.0.0.0
        --port 5001
        --backend-store-uri sqlite:///mlflow.db
        --default-artifact-root ./mlruns
    restart: unless-stopped

  # ── Pipeline de entrenamiento (se corre una vez con: docker compose run --rm pipeline) ──
  pipeline:
    build:
      context: .
      dockerfile: Dockerfile.pipeline
    volumes:
      - ./data:/app/data
      - ./artifacts:/app/artifacts
      - ./reportes:/app/reportes
      - ./mlruns:/app/mlruns
    environment:
      - MLFLOW_TRACKING_URI=file:///app/mlruns
    command: python main.py --sintetico
    profiles:
      - train

  # ── API FastAPI ─────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: serve/Dockerfile
    ports:
      - "8002:8002"
    volumes:
      - ./artifacts:/app/artifacts
    environment:
      - MLFLOW_TRACKING_URI=sqlite:///mlflow.db
      - UMBRAL_FALLA=0.40
    restart: unless-stopped
